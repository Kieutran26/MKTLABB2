                  <li key={i} className="flex items-start gap-1.5">
                    <span className="material-symbols-outlined text-green-500 shrink-0 mt-0.5" style={{fontSize: '16px'}}>check_circle</span>
                    <span className="leading-tight">{task}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>

          <button 
            className={`w-full mt-auto text-xs font-medium tracking-wide py-2 rounded-lg transition-colors border flex items-center justify-center gap-1.5 ${
              copied 
              ? 'bg-green-50 border-green-200 text-green-600 opacity-100' 
              : 'bg-gray-50 hover:bg-gray-100 text-gray-600 border-gray-100 opacity-60 group-hover:opacity-100'
            }`}
            onClick={handleCopy}
          >
             {copied ? (
               <>
                 <span className="material-symbols-outlined" style={{fontSize: '16px'}}>check</span> Đã copy!
               </>
             ) : (
               <>
                 <span className="material-symbols-outlined" style={{fontSize: '16px'}}>content_copy</span> Copy Lệnh
               </>
             )}
          </button>
        </div>
      );
    };

    const SkillDashboard = () => {
      const [searchQuery, setSearchQuery] = React.useState('');
      const [activeGroup, setActiveGroup] = React.useState('All');
      const [activeTab, setActiveTab] = React.useState('All');

      const [problemQuery, setProblemQuery] = React.useState('');
      const [suggestedAgent, setSuggestedAgent] = React.useState(null);
      const [isAnalyzing, setIsAnalyzing] = React.useState(false);
      const [hasSearched, setHasSearched] = React.useState(false);

      const handleSuggest = () => {
        if (!problemQuery.trim()) {
          setSuggestedAgent(null);
          setHasSearched(false);
          return;
        }
        setIsAnalyzing(true);
        
        setTimeout(() => {
          const query = problemQuery.toLowerCase().trim();
          const words = query.split(/\s+/).filter(w => w.length > 2);
          
          let bestMatch = null;
          let maxScore = 0;

          agentsData.forEach(agent => {
            let score = 0;
            const tData = (agent.title + " " + agent.tasks.join(" ") + " " + agent.name + " " + agent.type).toLowerCase();
            
            words.forEach(w => {
              if (tData.includes(w)) {
                const count = (tData.split(w).length - 1);
                score += count * (agent.title.toLowerCase().includes(w) ? 2 : 1);
              }
            });
            
            if (score > maxScore) {
              maxScore = score;
              bestMatch = agent;
            }
          });

          setSuggestedAgent(maxScore > 0 ? bestMatch : null);
          setIsAnalyzing(false);
          setHasSearched(true);
        }, 500); 
      };

      // Tự động detect tabs
      const allTabs = ['All', ...new Set(agentsData.map(item => item.type))].sort();

      const filteredAgents = agentsData.filter(agent => {
        const matchSearch = agent.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                            agent.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                            agent.call.toLowerCase().includes(searchQuery.toLowerCase());
        const matchGroup = activeGroup === 'All' ? true : agent.group === activeGroup;
        const matchTab = activeTab === 'All' ? true : agent.type === activeTab;
        
        return matchSearch && matchGroup && matchTab;
      });

      const marketingCount = agentsData.filter(a => a.group === 'Marketing Kit').length;
      const engineerCount = agentsData.filter(a => a.group === 'Engineer Kit').length;

      // Icon mapper
      const getIconForType = (type) => {
        const iconStyle = "material-symbols-outlined mr-1.5 flex-shrink-0";
        const iconSize = { fontSize: '18px' };
        switch(type) {
          case 'Analytics': return <span className={iconStyle} style={iconSize}>bar_chart</span>;
          case 'Campaign': return <span className={iconStyle} style={iconSize}>track_changes</span>;
          case 'SEO': return <span className={iconStyle} style={iconSize}>search</span>;
          case 'Social': return <span className={iconStyle} style={iconSize}>share</span>;
          case 'Content': return <span className={iconStyle} style={iconSize}>description</span>;
          case 'Email': return <span className={iconStyle} style={iconSize}>mail</span>;
          case 'Sale': return <span className={iconStyle} style={iconSize}>attach_money</span>;
          case 'Design': return <span className={iconStyle} style={iconSize}>edit</span>;
          case 'Management': return <span className={iconStyle} style={iconSize}>work</span>;
          case 'Marketing': return <span className={iconStyle} style={iconSize}>campaign</span>;
          case 'Architecture': return <span className={iconStyle} style={iconSize}>layers</span>;
          case 'Backend': return <span className={iconStyle} style={iconSize}>dns</span>;
          case 'Frontend': return <span className={iconStyle} style={iconSize}>dashboard</span>;
          case 'Testing': return <span className={iconStyle} style={iconSize}>check_circle</span>;
          case 'Workflow': return <span className={iconStyle} style={iconSize}>account_tree</span>;
          case 'Ads': return <span className={iconStyle} style={iconSize}>ads_click</span>;
          default: return <span className={iconStyle} style={iconSize}>bolt</span>;
        }
      };

      return (
        <div className="flex bg-gray-50 h-screen font-sans overflow-hidden">
          {/* SIDEBAR */}
          <div className="w-64 bg-white border-r border-gray-200 flex flex-col h-full shrink-0">
            <div className="p-6">
              <div className="flex items-center gap-2 mb-2 cursor-pointer" onClick={() => {setActiveGroup('All'); setActiveTab('All')}}>
                <div className="w-8 h-8 rounded-lg bg-black flex items-center justify-center text-white font-bold text-sm">
                  CK
                </div>
                <div>
                  <h1 className="text-sm font-semibold text-gray-900 leading-tight">ClaudeKit Map</h1>
                  <p className="text-xs text-gray-500">Opti M.KI Engine</p>
                </div>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto pt-2 px-4 scrollbar-hide">
              <div className="space-y-6">
                <div>
                  <h2 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 px-2">Workspaces</h2>
                  <ul className="space-y-1 text-sm">
                    <li>
                      <button 
                        onClick={() => setActiveGroup('Marketing Kit')}
                        className={`w-full flex items-center justify-between px-2 py-2 rounded-md transition-colors ${activeGroup === 'Marketing Kit' ? 'bg-blue-50 text-blue-600 font-medium' : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900'}`}
                      >
                        <span className="flex items-center gap-2">
                          <span className="material-symbols-outlined" style={{fontSize: '20px'}}>lightbulb</span>
                          Marketing Kit
                        </span>
                        <span className="bg-gray-100 text-gray-500 py-0.5 px-2 rounded-full text-xs">{marketingCount}</span>
                      </button>
                    </li>
                    <li>
                      <button 
                        onClick={() => setActiveGroup('Engineer Kit')}
                        className={`w-full flex items-center justify-between px-2 py-2 rounded-md transition-colors ${activeGroup === 'Engineer Kit' ? 'bg-blue-50 text-blue-600 font-medium' : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900'}`}
                      >
                        <span className="flex items-center gap-2">
                          <span className="material-symbols-outlined" style={{fontSize: '20px'}}>code</span>
                          Engineer Kit
                        </span>
                        <span className="bg-gray-100 text-gray-500 py-0.5 px-2 rounded-full text-xs">{engineerCount}</span>
                      </button>
                    </li>
                  </ul>
                </div>

                {/* AI Suggestion */}
                <div className="pt-4 border-t border-gray-100">
                  <h2 className="text-[11px] font-bold text-blue-600 uppercase tracking-wider mb-2 px-2 flex items-center gap-1.5">
                    <span className="material-symbols-outlined shrink-0" style={{fontSize: '16px'}}>smart_toy</span>
                    Hỏi AI Gợi Ý Lệnh
                  </h2>
                  <div className="px-2">
                    <textarea 
                      placeholder="Mô tả vấn đề (vd: xếp hạng từ khóa)..."
                      className="w-full text-xs box-border border border-gray-200 rounded-md p-2 bg-gray-50 focus:bg-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none h-16 mb-2 transition-colors placeholder-gray-400"
                      value={problemQuery}
                      onChange={(e) => {
                         setProblemQuery(e.target.value);
                         if(e.target.value === '') {
                             setSuggestedAgent(null);
                             setHasSearched(false);
                         }
                      }}
                    ></textarea>
                    <button 
                      onClick={handleSuggest}
                      disabled={isAnalyzing || !problemQuery.trim()}
                      className="w-full bg-gray-900 text-white text-xs font-medium py-1.5 rounded hover:bg-gray-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center justify-center gap-1 shadow-sm"
                    >
                      {isAnalyzing ? (
                        <span className="material-symbols-outlined animate-spin" style={{fontSize: '14px'}}>sync</span>
                      ) : (
                        <span className="material-symbols-outlined" style={{fontSize: '14px'}}>search_insights</span>
                      )}
                      {isAnalyzing ? 'Đang phân tích...' : 'Tìm lệnh xử lý'}
                    </button>

                    {suggestedAgent && (
                      <div className="mt-3 p-3 bg-blue-50 border border-blue-100 rounded-md box-border break-words">
                        <p className="text-[10px] text-blue-600 font-bold mb-1 tracking-wide">💡 LỆNH PHÙ HỢP NHẤT:</p>
                        <p className="text-xs font-bold text-gray-900 mb-0.5">{suggestedAgent.name}</p>
                        <p className="text-[11px] text-gray-600 mb-2 line-clamp-2 leading-tight" title={suggestedAgent.title}>{suggestedAgent.title}</p>
                        <button 
                          onClick={() => {
                            navigator.clipboard.writeText(suggestedAgent.call);
                            // We can select the parent card text or just show a small native popup if needed, or rely on clipboard only
                            alert('Đã copy lệnh: ' + suggestedAgent.call);
                          }}
                          className="w-full bg-white border border-blue-200 text-blue-700 text-[11px] py-1 rounded shadow-sm hover:bg-blue-100 transition-colors flex items-center justify-center gap-1 font-semibold box-border"
                        >
                          <span className="material-symbols-outlined" style={{fontSize: '14px'}}>content_copy</span> Copy Lệnh
                        </button>
                      </div>
                    )}
                    {suggestedAgent === null && hasSearched && !isAnalyzing && (
                        <div className="mt-3 p-2 text-[11px] text-center text-rose-500 bg-rose-50 border border-rose-100 rounded-md box-border">
                          Không tìm thấy Agent nào. Hãy thử từ khóa khác!
                        </div>
                    )}
                  </div>
                </div>

              </div>
            </div>

            <div className="p-4 border-t border-gray-100 mt-auto">
              <div className="flex items-center gap-3">
                <img src={`https://ui-avatars.com/api/?name=MK&background=0D8ABC&color=fff`} alt="User" className="w-8 h-8 rounded-full" />
                <div className="text-sm">
                  <p className="font-medium text-gray-900">Marketing Exec.</p>
                  <p className="text-xs text-gray-500">Commander</p>
                </div>
              </div>
            </div>
          </div>

          {/* MAIN CONTENT */}
          <div className="flex-1 flex flex-col min-w-0 h-full overflow-hidden relative">
            
            {/* Header / Filter area */}
            <div className="px-8 pt-8 pb-4 shrink-0 bg-gray-50/80 backdrop-blur-md sticky top-0 z-10">
              <div className="flex items-center justify-between mb-6">
                <h1 className="text-2xl font-semibold text-gray-900 tracking-tight">
                  {activeGroup === 'All' ? 'Tất cả Agents & Skills' : activeGroup} 
                  <span className="ml-2 text-sm font-medium text-gray-400 bg-gray-200 px-2 py-1 rounded-full">{filteredAgents.length}</span>
                </h1>
                
                <div className="relative w-72">
                  <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                     <span className="material-symbols-outlined text-gray-400" style={{fontSize: '20px'}}>search</span>
                  </div>
                  <input 
                    type="text" 
                    placeholder="Tìm theo tên hoặc lệnh gọi..."
                    className="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-lg text-sm bg-white placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 shadow-sm transition-shadow"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                  />
                </div>
              </div>

              {/* Tabs */}
              <div className="flex items-center space-x-2 overflow-x-auto scrollbar-hide flex-nowrap pb-1">
                {allTabs.map(tab => (
                  <button
                    key={tab}
                    onClick={() => setActiveTab(tab)}
                    className={`whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium transition-colors ${
                      activeTab === tab 
                      ? 'bg-gray-900 text-white' 
                      : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'
                    }`}
                  >
                    {tab}
                  </button>
                ))}
              </div>
            </div>

            {/* Content List */}
            <div className="flex-1 px-8 pb-12 overflow-y-auto">
              {filteredAgents.length === 0 ? (
                <div className="flex flex-col items-center justify-center h-64 text-center">
                  <span className="material-symbols-outlined text-gray-300 mb-4" style={{fontSize: '48px'}}>inbox</span>
                  <p className="text-gray-500 font-medium">Không tìm thấy Agent hay Skill nào phù hợp.</p>
                </div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                  {filteredAgents.map((agent, index) => (
                    <AgentCard key={index} agent={agent} getIconForType={getIconForType} />
                  ))}
                </div>
              )}
            </div>

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SkillDashboard />);
  </script>
</body>
</html>
